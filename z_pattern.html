<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Lock - Pattern (Retro UI)</title>
  <style>
    /* 구글 폰트 임포트 */
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root { 
      --accent: #0f0; 
      --bg-side: #0033DA;
      --bg-center: #000;
    }
    
    body { 
      margin: 0; 
      height: 100vh; 
      display: flex; 
      font-family: 'Share Tech Mono', monospace; 
      overflow: hidden; 
      background: var(--bg-side);
      color: white;
    }
    
    #left-pane, #right-pane { flex: 1; position: relative; }

    /* ===========================
       [좌측 프레임 UI 디자인] 
       =========================== */
    .phone-icon {
      position: absolute;
      top: 50px; left: 50px;
      width: 60px; height: 120px;
      background: #f0f0f0;
      border: 6px solid #222;
      border-radius: 12px;
      transform: rotate(-15deg);
      box-shadow: -15px 15px 0px rgba(0,0,0,0.2);
    }
    .phone-icon::before {
      content: '';
      position: absolute;
      top: 10px; left: 4px; right: 4px; bottom: 10px;
      background: #fff;
      border-radius: 4px;
    }
    .phone-icon::after {
      content: '';
      position: absolute;
      top: -2px; left: 50%; transform: translateX(-50%);
      width: 20px; height: 5px; background: #222;
      border-bottom-left-radius: 4px; border-bottom-right-radius: 4px;
    }

    .left-info {
      position: absolute;
      top: 300px;
      left: 50px;
      font-size: 1.rem;
      font-family: "Gothic A1", sans-serif;
      letter-spacing: 1px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.8);
    }

    .brand-logo {
      position: absolute;
      bottom: 40px;
      font-family: sans-serif;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .left-logo { left: 50px; }
    .right-logo { right: 50px; }

    .logo-img {
      width: 160px;     /* 크기 조절 */
      height: auto;
      display: block;
    }

    .left-back-btn {
        position: absolute;
        bottom: 40px;
        left: 50px;

        background: none;
        border: 2px solid white;
        color: white;
        padding: 8px 16px;
        border-radius: 20px;

        font-family: "Geo", sans-serif;
        font-weight: 400;
        font-size: 16pt;

        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none; /* a태그 밑줄 제거 */
    }

    .left-back-btn:hover {
      background-color: white;
      color: #0033DA;
    }

    /* ===========================
       [우측 프레임 UI 디자인] 
       =========================== */
    .chain-bg {
      position: absolute;
      top: -20px; right: -80px;
      width: 100%; height: 30px;
      background-image: url("chain_white.svg");
      transform: rotate(20deg);
    }

    /* ===========================
       [가운데 프레임 UI 디자인] 
       =========================== */
    #center-pane { flex: 1.4; padding: 40px 0; box-sizing: border-box; display: flex; }
    .center-wrapper {
      flex: 1; background: var(--bg-center);
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0px 20px 50px rgba(0,0,0,0.8);
      border: 1px solid #0f0;
    }

    /* 상단 상태바 */
    #header { 
      background: #000; 
      display: flex; 
      align-items: flex-start; 
      justify-content: space-between; 
      padding: 20px;
      border-bottom: 2px solid #222;
      z-index: 10; 
    }

    .header-level { font-size: 20px; width: 120px; color: var(--accent); }
    .header-center { flex-grow: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .header-title { font-size: 20px; text-align: center; letter-spacing: 1px; }

    /* 우측 프로그레스 바 (3단계) */
    .header-progress-wrap { width: 100px; display: flex; justify-content: flex-end; align-items: center; padding-top: 5px; }
    .progress-bar { display: flex; align-items: center; }
    .p-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid #fff;
    }
    .p-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .p-line { width: 15px; height: 2px; background: #444; }

    #viewport { 
      flex: 1; 
      position: relative; 
      width: 100%; 
      height: 100%;
    }
    #main-canvas { width: 100%; height: 100%; display: block; }
    
    /* Footer 바깥으로 튀어나가는 현상 수정 */
    #footer { 
      background: rgba(0, 0, 0, 0.9); 
      padding: 15px;
      text-align: center;
      color: var(--accent); 
      font-size: 16px; 
      letter-spacing: 2px;
      border-top: 1px solid #222;
    }

    /* 흔들림 */
@keyframes shake {
  0%   { transform: translateX(0); }
  8%   { transform: translateX(-14px); }
  16%  { transform: translateX(14px); }
  24%  { transform: translateX(-10px); }
  32%  { transform: translateX(10px); }
  40%  { transform: translateX(-6px); }
  48%  { transform: translateX(6px); }
  56%  { transform: translateX(-3px); }
  64%  { transform: translateX(3px); }
  72%  { transform: translateX(-1px); }
  80%  { transform: translateX(1px); }
  100% { transform: translateX(0); }
}

/* 빨간 테두리 펄스 */
@keyframes borderPulse {
  0%   { box-shadow: 0 0 0px 0px rgba(255,0,0,0); border-color: #0f0; }
  10%  { box-shadow: 0 0 30px 10px rgba(255,0,0,0.8); border-color: #f00; }
  30%  { box-shadow: 0 0 60px 20px rgba(255,0,0,0.5); border-color: #f00; }
  70%  { box-shadow: 0 0 20px 5px rgba(255,0,0,0.3); border-color: #f00; }
  100% { box-shadow: 0 0 0px 0px rgba(255,0,0,0); border-color: #0f0; }
}

/* 빨간 플래시 */
@keyframes flashOverlay {
  0%   { opacity: 0; }
  10%  { opacity: 0.35; }
  30%  { opacity: 0.15; }
  60%  { opacity: 0.05; }
  100% { opacity: 0; }
}

/* 스캔라인 글리치 */
@keyframes scanNoise {
  0%   { background-position: 0 0; opacity: 0; }
  5%   { opacity: 0.15; }
  50%  { background-position: 0 -200px; opacity: 0.1; }
  100% { background-position: 0 -400px; opacity: 0; }
}

.center-wrapper.fail-shake {
  animation: shake 0.6s ease-out, borderPulse 1.5s ease-out;
}

#fail-overlay {
  position: absolute;
  inset: 0;
  background: rgba(255, 0, 0, 0.0);
  pointer-events: none;
  z-index: 20;
  mix-blend-mode: screen;
}
#fail-overlay.active {
  animation: flashOverlay 1.5s ease-out forwards;
}

#glitch-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 21;
  opacity: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 3px,
    rgba(255,0,0,0.04) 3px, rgba(255,0,0,0.04) 4px
  );
}
#glitch-overlay.active {
  animation: scanNoise 1.5s ease-out forwards;
}

@keyframes warnBlink {
  0%, 100% { opacity: 1; color: red; }
  50%       { opacity: 0.3; color: #ff6666; }
}
#status-txt.fail-blink {
  animation: warnBlink 0.25s ease-in-out 6;
}

#reset-warning {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 25;
  font-size: 18px;
  color: #f00;
  letter-spacing: 3px;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  text-shadow: 0 0 20px #f00, 0 0 40px #f00;
}
@keyframes warningAppear {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(1.3); }
  20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
  80%  { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
}
#reset-warning.active {
  animation: warningAppear 1.5s ease forwards;
}
    
    video { display: none; }
  </style>
</head>
<body>

  <div id="left-pane">
    <div class="phone-icon"></div>
    <div class="left-info">
      <div style="color: #0f0; font-family: 'Geo', sans-serif; font-size: 1.6rem;">Draw the pattern to Unlock</div><br>
      지시하는 대로 패턴을 입력하여<br>
      잠금해제를 시도하세요.<br>
      3초동안 대기하면 정답이 제출됩니다.<br>
      순서도 당연히 중요합니다!
    </div>
    <a href="index.html" class="left-back-btn">← BACK</a>
  </div>
  
  <div id="center-pane">
    <div class="center-wrapper" id="center-wrapper">
        <div id="fail-overlay"></div>
  <div id="glitch-overlay"></div>
  <div id="reset-warning">⚠ ACCESS DENIED<br><span style="font-size:13px; letter-spacing:2px;">RESETTING TO LEVEL 1</span></div>
      <div id="header">
        <div class="header-level" id="level-txt">Level 1</div>
        <div class="header-center">
            <div class="header-title" id="stage-title">MISSION: PATTERN</div>
          <canvas id="mission-canvas" width="70" height="70"></canvas>
        </div>
        <div class="header-progress-wrap">
          <div class="progress-bar">
            <div class="p-dot" id="dot-1"></div>
            <div class="p-line"></div>
            <div class="p-dot" id="dot-2"></div>
            <div class="p-line"></div>
            <div class="p-dot" id="dot-3"></div>
          </div>
        </div>
      </div>
      
      <div id="viewport">
        <canvas id="main-canvas"></canvas>
        <div id="footer">STATUS: <span id="status-txt">READY</span></div>
      </div>
    </div>
  </div>

  <div id="right-pane">
    <div class="chain-bg"></div>
    <div class="brand-logo right-logo">
        <img src="logo_white.svg" class="logo-img">
    </div>
  </div>

  <video id="video" playsinline></video>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script>
const mCanvas = document.getElementById('main-canvas');
const mCtx = mCanvas.getContext('2d');
const gCanvas = document.getElementById('mission-canvas');
const gCtx = gCanvas.getContext('2d');
const video = document.getElementById('video');
const statusTxt = document.getElementById('status-txt');
const centerWrapper = document.getElementById('center-wrapper');
const failOverlay = document.getElementById('fail-overlay');
const glitchOverlay = document.getElementById('glitch-overlay');
const resetWarning = document.getElementById('reset-warning');

// --- UI 요소 선택기 ---
const levelTxt = document.querySelector('.header-level');
const progressDots = document.querySelectorAll('.p-dot');

let currentLevel = 1; // 현재 레벨 (1~3)
let gridSizeN = 2;    // N x N 그리드 사이즈 (초기 2x2)
let points = [];
let missionPattern = [];
let userPattern = [];
let threshold = 45;   // 터치 인식 반경 (동적 할당)

let submitTimer = null; 
let isFailed = false; 

function init() {
  mCanvas.width = mCanvas.clientWidth;
  mCanvas.height = mCanvas.clientHeight;
  updateLevelUI();
  setupGrid();
  generateMission();
}

function triggerFailEffect() {
  centerWrapper.classList.remove('fail-shake');
  void centerWrapper.offsetWidth;
  centerWrapper.classList.add('fail-shake');

  failOverlay.classList.remove('active');
  void failOverlay.offsetWidth;
  failOverlay.classList.add('active');

  glitchOverlay.classList.remove('active');
  void glitchOverlay.offsetWidth;
  glitchOverlay.classList.add('active');

  statusTxt.classList.remove('fail-blink');
  void statusTxt.offsetWidth;
  statusTxt.classList.add('fail-blink');

  resetWarning.classList.remove('active');
  void resetWarning.offsetWidth;
  resetWarning.classList.add('active');

  setTimeout(() => {
    centerWrapper.classList.remove('fail-shake');
    failOverlay.classList.remove('active');
    glitchOverlay.classList.remove('active');
    statusTxt.classList.remove('fail-blink');
    resetWarning.classList.remove('active');
  }, 1600);
}

// 레벨에 맞춰 UI 텍스트와 프로그레스 바 점(Dot) 업데이트
function updateLevelUI() {
  levelTxt.innerText = "Level " + currentLevel;
  progressDots.forEach((dot, index) => {
    if (index < currentLevel) dot.classList.add('active');
    else dot.classList.remove('active');
  });
}

// 레벨에 맞춰 N x N 점선 배열 및 인식 범위 셋팅
function setupGrid() {
      points = [];
      if (currentLevel === 1) gridSizeN = 2;
      else if (currentLevel === 2) gridSizeN = 3;
      else if (currentLevel === 3) gridSizeN = 4;

      const gridSize = mCanvas.width * 0.65;
      const startX = (mCanvas.width - gridSize) / 2;
      const startY = (mCanvas.height - gridSize) / 2;
      const step = gridSize / (gridSizeN - 1);

      threshold = Math.min(45, step * 0.4); 

      for(let i=0; i<gridSizeN; i++) {
        for(let j=0; j<gridSizeN; j++) {
          // 🔴 [수정] 좌우 반전된 캔버스에 맞춰 j의 위치(X좌표)를 역순으로 배치합니다.
          points.push({ x: startX + (gridSizeN - 1 - j) * step, y: startY + i * step });
        }
      }
    }

// 레벨에 따른 난이도로 미션 생성
function generateMission() {
  const totalDots = gridSizeN * gridSizeN;
  let minLen, maxLen;
  
  // 레벨별로 연결해야 하는 최소~최대 선 길이 지정
  if (currentLevel === 1) { minLen = 3; maxLen = 4; }
  else if (currentLevel === 2) { minLen = 4; maxLen = 6; }
  else { minLen = 5; maxLen = 8; }
  
  const length = Math.floor(Math.random() * (maxLen - minLen + 1)) + minLen; 
  const indices = Array.from({length: totalDots}, (_, k) => k); // 0 부터 totalDots-1 까지 배열 생성
  missionPattern = indices.sort(() => Math.random() - 0.5).slice(0, length);
  userPattern = [];
  drawMission();
}

function drawMission() {
  gCtx.clearRect(0,0,70,70);
  gCtx.beginPath(); 
  gCtx.strokeStyle = "#ffffff"; 
  gCtx.lineWidth = 3; 
  gCtx.lineJoin = "round";
  gCtx.lineCap = "round";
  
  // 70x70 캔버스 내에서 패딩 15씩 제외한 40의 공간을 N등분
  const step = 40 / (gridSizeN - 1); 

  missionPattern.forEach((idx, i) => {
    const col = idx % gridSizeN;
    const row = Math.floor(idx / gridSizeN);
    const x = col * step + 15;
    const y = row * step + 15;
    
    if(i === 0) gCtx.moveTo(x, y); 
    else gCtx.lineTo(x, y);
  });
  gCtx.stroke();
}

const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

hands.onResults((results) => {
  if (!results.image) return;
  const vW = results.image.width; const vH = results.image.height;
  const cW = mCanvas.width; const cH = mCanvas.height;
  const vRatio = vW / vH; const cRatio = cW / cH;
  let sW, sH, sx, sy;
  if (vRatio > cRatio) { sH = vH; sW = vH * cRatio; sx = (vW - sW) / 2; sy = 0; }
  else { sW = vW; sH = vW / cRatio; sx = 0; sy = (vH - sH) / 2; }
  
  mCtx.save();
  mCtx.clearRect(0, 0, cW, cH);
  mCtx.translate(cW, 0); mCtx.scale(-1, 1);
  mCtx.globalAlpha = 0.5;
  mCtx.drawImage(results.image, sx, sy, sW, sH, 0, 0, cW, cH);

  // N x N 점 시각화
  points.forEach((p, i) => {
    const visited = userPattern.includes(i);
    mCtx.beginPath(); mCtx.arc(p.x, p.y, visited ? 12 : 8, 0, Math.PI*2);
    mCtx.fillStyle = visited ? (isFailed ? "#f00" : "#0f0") : "rgba(255,255,255,0.25)";
    mCtx.fill();
  });

  if (currentLevel > 3) {
    mCtx.restore();
    return; // 모든 스테이지 클리어 시 그리기 중단
  }

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const landmarks = results.multiHandLandmarks[0];
    const tip = landmarks[8]; // 검지 끝
    const realX = ((tip.x * vW) - sx) * (cW / sW);
    const realY = ((tip.y * vH) - sy) * (cH / sH);

    // 오답(FAIL) 상태가 아닐 때만 패턴 입력받기
    if (!isFailed) {
      let touchedNewDot = false;
      points.forEach((p, i) => {
        const d = Math.hypot(p.x - realX, p.y - realY);
        if (d < threshold && !userPattern.includes(i)) {
          userPattern.push(i);
          touchedNewDot = true;
        }
      });

      if (touchedNewDot) {
        statusTxt.innerText = "DRAWING... (WAIT 3S)";
        statusTxt.style.color = "#0f0";

        if (submitTimer) clearTimeout(submitTimer);
        submitTimer = setTimeout(() => {
          checkAnswer();
        }, 3000);
      }
    }

    // 패턴 선 그리기
    if (userPattern.length > 0) {
      mCtx.beginPath(); 
      mCtx.strokeStyle = isFailed ? "#f00" : "#0f0"; 
      mCtx.lineWidth = 4;
      mCtx.lineJoin = "round"; mCtx.lineCap = "round";
      
      mCtx.moveTo(points[userPattern[0]].x, points[userPattern[0]].y);
      userPattern.forEach(idx => mCtx.lineTo(points[idx].x, points[idx].y));
      
      if (!isFailed) mCtx.lineTo(realX, realY); 
      mCtx.stroke();
    }

    // 손가락 마커
    mCtx.beginPath();
    mCtx.arc(realX, realY, 8, 0, Math.PI * 2);
    mCtx.fillStyle = "#fff"; 
    mCtx.fill();
    mCtx.lineWidth = 3;
    mCtx.strokeStyle = isFailed ? "#f00" : "#0f0"; 
    mCtx.stroke();
  }
  mCtx.restore();
});

function checkAnswer() {
  let isCorrect = false;

  // 레벨 상관없이 모든 단계에서 '모양(선의 집합)'이 같으면 통과!
  if (userPattern.length === missionPattern.length) {
    const getEdges = (pattern) => {
      const edges = [];
      for (let i = 0; i < pattern.length - 1; i++) {
        const a = pattern[i];
        const b = pattern[i+1];
        edges.push(a < b ? `${a}-${b}` : `${b}-${a}`);
      }
      return edges.sort().join('|'); 
    };
    isCorrect = getEdges(userPattern) === getEdges(missionPattern);
  }
  
  if (isCorrect) {
    statusTxt.innerText = "LEVEL CLEAR!!";
    statusTxt.style.color = "#0f0";
    
    setTimeout(() => {
      userPattern = [];
      currentLevel++; // 다음 레벨로 넘어감
      
      if (currentLevel > 3) {
        levelTxt.innerText = "UNLOCKED";
        statusTxt.innerText = "SYSTEM UNLOCKED. ACCESS GRANTED.";
        statusTxt.style.color = "#0f0";
        gCtx.clearRect(0,0,70,70); 
      } else {
        updateLevelUI();
        setupGrid();
        generateMission();
        statusTxt.innerText = "READY";
      }
    }, 1200);
  } else {
    isFailed = true; 
    triggerFailEffect();
    // 🔴 [수정] 실패 시 1단계로 돌아간다는 경고 메시지로 변경
    statusTxt.innerText = "FAIL! RESET TO LEVEL 1!";
    statusTxt.style.color = "red";
    
    setTimeout(() => { 
      userPattern = []; 
      isFailed = false; 
      
      // 🔴 [수정] 레벨을 1로 초기화하고 UI 및 그리드 새로고침
      currentLevel = 1;
      updateLevelUI();
      setupGrid();
      
      statusTxt.innerText = "READY"; 
      statusTxt.style.color = "#0f0"; 
      generateMission(); 
    }, 1500); // 1.5초 뒤에 1단계로 리셋
  }
}


const camera = new Camera(video, { onFrame: async () => { await hands.send({ image: video }); }, width: 640, height: 480 });
    camera.start().then(() => {
      setTimeout(init, 500);
    });

// 화면 리사이즈 시 그리드 재배치
window.addEventListener('resize', init);
  </script>
</body>
</html>
