<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Lock - Fingerprint Scanner (Retro UI)</title>
  <style>
    /* 구글 폰트 임포트 */
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root { 
      --accent: #0f0;         /* 전체 UI의 메인 포인트 컬러 (그린) */
      --scanner: #0ff;        /* 지문 스캐너 기본 색상 (시안) */
      --bg-side: #0033DA; 
      --bg-center: #000;
    }
    
    body { 
      margin: 0; 
      height: 100vh; 
      display: flex; 
      font-family: 'Share Tech Mono', monospace; 
      overflow: hidden; 
      background: var(--bg-side);
      color: white;
    }
    
    #left-pane, #right-pane {
      flex: 1; 
      position: relative;
    }

    /* ===========================
       [좌측 프레임 UI 디자인] 
       =========================== */
    .phone-icon {
      position: absolute;
      top: 50px; left: 50px;
      width: 60px; height: 120px;
      background: #f0f0f0;
      border: 6px solid #222;
      border-radius: 12px;
      transform: rotate(-15deg);
      box-shadow: -15px 15px 0px rgba(0,0,0,0.2);
    }
    .phone-icon::before {
      content: '';
      position: absolute;
      top: 10px; left: 4px; right: 4px; bottom: 10px;
      background: #fff;
      border-radius: 4px;
    }
    .phone-icon::after {
      content: '';
      position: absolute;
      top: -2px; left: 50%; transform: translateX(-50%);
      width: 20px; height: 5px; background: #222;
      border-bottom-left-radius: 4px; border-bottom-right-radius: 4px;
    }

    .left-info {
      position: absolute;
      top: 300px;
      left: 50px;
      font-size: 1.6rem;
      font-family: "Gothic A1", sans-serif;
      letter-spacing: 1px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.8);
    }

    .brand-logo {
      position: absolute;
      bottom: 40px;
      font-family: sans-serif;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .left-logo { left: 50px; }
    .right-logo { right: 50px; }

    .logo-img {
      width: 160px;     /* 크기 조절 */
      height: auto;
      display: block;
    }

    .left-back-btn {
        position: absolute;
        bottom: 40px;
        left: 50px;

        background: none;
        border: 2px solid white;
        color: white;
        padding: 8px 16px;
        border-radius: 20px;

        font-family: "Geo", sans-serif;
        font-weight: 400;
        font-size: 16pt;

        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none; /* a태그 밑줄 제거 */
    }

    .left-back-btn:hover {
        background-color: white;
        color: #0033DA;
    }

    /* ===========================
       [우측 프레임 UI 디자인] 
       =========================== */
    .chain-bg {
      position: absolute;
      top: -20px; right: -80px;
      width: 100%; height: 30px;
      background-image: url("chain_white.svg"); /* 기존 경로 유지 */
      transform: rotate(20deg);
    }

    /* ===========================
       [가운데 프레임 UI 디자인] 
       =========================== */
    #center-pane { flex: 1.4; padding: 40px 0; box-sizing: border-box; display: flex; }
    .center-wrapper {
      flex: 1; background: var(--bg-center);
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0px 20px 50px rgba(0,0,0,0.8);
      border: 1px solid #0f0;
    }


    /* 상단 상태바 */
    #header { 
      background: #000; 
      display: flex; 
      align-items: flex-start; 
      justify-content: space-between; 
      padding: 20px;
      border-bottom: 2px solid #222;
      z-index: 10; 
    }

    .header-level { font-size: 20px; width: 120px; color: var(--accent); }
    .header-center { flex-grow: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .header-title { font-size: 20px; text-align: center; letter-spacing: 1px; }
    #mission-canvas { background: #111; border: 1px solid #333; }

    .header-progress-wrap { width: 100px; display: flex; justify-content: flex-end; align-items: center; padding-top: 5px; }
    .progress-bar { display: flex; align-items: center; }
    .p-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid #fff;
    }
    .p-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .p-line { width: 15px; height: 2px; background: #444; }

    #viewport { 
      flex: 1; 
      position: relative; 
      width: 100%; 
      height: 100%;
    }
    #main-canvas { 
      width: 100%; 
      height: 100%; 
      display: block;
    }
    
    #footer { 
      background: rgba(0, 0, 0, 0.8); 
      padding: 15px;
      text-align: center;
      color: var(--accent); 
      font-size: 16px; 
      font-weight: bold;
      z-index: 10; 
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      box-sizing: border-box; 
    }
    
    video { display: none; }
  </style>
</head>
<body>

  <div id="left-pane">
    <div class="phone-icon"></div>
    <div class="left-info">
    <div style="color: #0f0; font-family: 'Geo', sans-serif; font-size: 20pt;">Touch to Unlock</div><br>
    정해진 위치에 손가락을 올려<br>
    잠금해제를 시도하세요!<br>
    지문과 같은 고유한 생체 정보 역시<br>잠금을 해제하는 또 하나의 열쇠입니다.<br>
  </div>
    <a href="index.html" class="left-back-btn">← BACK</a>
  </div>
  
  <div id="center-pane">
    <div class="center-wrapper">
        <div id="header">
            <div class="header-level" id="level-txt">Level 1</div>
            <div class="header-center">
                <div class="header-title" id="stage-title">MISSION: TOUCH</div>
                <div style="font-size: 1.6rem; color: #666;">지문을 올려 잠금해제!</div>
            </div>
            <div class="header-progress-wrap">
              <div class="progress-bar">
                <div class="p-dot" id="dot-1"></div>
                <div class="p-line"></div>
                <div class="p-dot" id="dot-2"></div>
                <div class="p-line"></div>
                <div class="p-dot" id="dot-3"></div>
              </div>
            </div>
        </div>
      
      <div id="viewport">
        <canvas id="main-canvas"></canvas>
        <div id="footer">STATUS: <span id="status-txt">AWAITING FINGERPRINT...</span></div>
      </div>
    </div>
  </div>

  <div id="right-pane">
    <div class="chain-bg"></div>
    <div class="brand-logo right-logo">
        <img src="logo_white.svg" class="logo-img">
    </div>
  </div>

  <video id="video" playsinline></video>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script>
    // ==========================================
    // 기존 지문 인식 스캐너 로직 (절대 수정 금지 구역)
    // ==========================================
const mCanvas = document.getElementById('main-canvas');
const mCtx = mCanvas.getContext('2d');
const video = document.getElementById('video');
const statusTxt = document.getElementById('status-txt');

// UI 병합을 위해 ID 매핑
const headerTxt = document.getElementById('stage-title');
const levelTxt = document.getElementById('level-txt');

let currentStage = 1;
let isTransitioning = false;
let matchStartTime = 0;
const HOLD_DURATION = 1500; 
const MOVE_DURATION = 3000; 
const TARGET_RADIUS = 35; 

const FINGERS = [
  { id: 4, name: 'THUMB' },
  { id: 8, name: 'INDEX' },
  { id: 12, name: 'MIDDLE' },
  { id: 16, name: 'RING' },
  { id: 20, name: 'PINKY' }
];

let targets = [];

function shuffle(array) {
  let currentIndex = array.length, randomIndex;
  while (currentIndex !== 0) {
    randomIndex = Math.floor(Math.random() * currentIndex);
    currentIndex--;
    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
  }
  return array;
}

function init() {
  mCanvas.width = mCanvas.clientWidth;
  mCanvas.height = mCanvas.clientHeight;
  setupStage();
}

function setupStage() {
  const cW = mCanvas.width;
  const cH = mCanvas.height;
  targets = [];

  // [UI 연동] 현재 스테이지에 맞춰 좌측 레벨 숫자와 우측 점(dot) 색상 채우기
  levelTxt.innerText = "Level " + currentStage;
  document.getElementById('dot-1').className = currentStage >= 1 ? "p-dot active" : "p-dot";
  document.getElementById('dot-2').className = currentStage >= 2 ? "p-dot active" : "p-dot";
  document.getElementById('dot-3').className = currentStage >= 3 ? "p-dot active" : "p-dot";

  if (currentStage === 1) {
    headerTxt.innerText = "STAGE 1: ANY FINGER";
    targets.push({ x: cW/2, y: cH/2, reqFinger: null, matched: false });
  } 
  else if (currentStage === 2) {
    headerTxt.innerText = "STAGE 2: MULTI-SCAN";
    const selected = shuffle([...FINGERS]).slice(0, 3); 
    targets.push({ x: cW/2, y: cH/2 - 100, reqFinger: selected[0], matched: false }); 
    targets.push({ x: cW/2 - 120, y: cH/2 + 80, reqFinger: selected[1], matched: false }); 
    targets.push({ x: cW/2 + 120, y: cH/2 + 80, reqFinger: selected[2], matched: false }); 
  } 
  else if (currentStage === 3) {
    headerTxt.innerText = "STAGE 3: FULL SCAN PROTOCOL";
    // 1. 손가락 5개 중 4개를 랜덤하게 선택
    const selected = shuffle([...FINGERS]).slice(0, 4); 
    
    // 2. 4개의 타겟 위치 및 경로 설정 (X좌표를 일정 간격으로 배치)
    // 손가락들이 겹치지 않게 가로로 나란히 배치합니다.
    const spacing = 120; // 타겟 간 간격
    const startOffset = - (spacing * 1.5); // 시작점 오프셋

    for (let i = 0; i < 4; i++) {
      const offsetX = startOffset + (i * spacing);
      
      // i가 짝수면 위에서 아래로, 홀수면 아래에서 위로 움직이게 교차 설정
      const isEven = i % 2 === 0;
      const startY = isEven ? cH / 2 - 180 : cH / 2 + 180;
      const endY = isEven ? cH / 2 + 180 : cH / 2 - 180;

      targets.push({ 
        x: cW / 2 + offsetX, 
        y: startY, 
        startX: cW / 2 + offsetX, 
        startY: startY, 
        endX: cW / 2 + offsetX, 
        endY: endY, 
        reqFinger: selected[i], 
        matched: false 
      });
    }
  }
}

function drawScannerFrame(x, y, isMatched, fingerName) {
  mCtx.save();
  mCtx.translate(x, y);
  
  // ★ 수정 1: Canvas가 인식할 수 없는 CSS 변수 대신 명시적인 색상 코드로 지정
  // 인식이 안 됐을 땐 반투명한 시안색, 인식이 됐을 땐 선명한 초록색으로 뚜렷하게 구분
  const color = isMatched ? "#00ff00" : "rgba(0, 255, 255, 0.5)";
  mCtx.strokeStyle = color;
  mCtx.lineWidth = 3;

  mCtx.beginPath();
  mCtx.arc(0, 0, TARGET_RADIUS, 0, Math.PI * 2);
  mCtx.stroke();

  mCtx.beginPath();
  mCtx.moveTo(-10, 0); mCtx.lineTo(10, 0);
  mCtx.moveTo(0, -10); mCtx.lineTo(0, 10);
  mCtx.stroke();

  mCtx.fillStyle = color;
  mCtx.font = "14px 'Share Tech Mono', monospace";
  mCtx.textAlign = "center";
  mCtx.fillText(fingerName ? fingerName : "ANY", 0, -TARGET_RADIUS - 10);

  mCtx.restore();
}

const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

hands.onResults((results) => {
  if (!results.image) return;
  const vW = results.image.width; const vH = results.image.height;
  const cW = mCanvas.width; const cH = mCanvas.height;
  
  const vRatio = vW / vH; const cRatio = cW / cH;
  let sW, sH, sx, sy;
  if (vRatio > cRatio) { sH = vH; sW = vH * cRatio; sx = (vW - sW) / 2; sy = 0; }
  else { sW = vW; sH = vW / cRatio; sx = 0; sy = (vH - sH) / 2; }
  
  mCtx.save();
  mCtx.clearRect(0, 0, cW, cH);
  mCtx.translate(cW, 0); mCtx.scale(-1, 1);
  
  mCtx.globalAlpha = 0.5; 
  mCtx.drawImage(results.image, sx, sy, sW, sH, 0, 0, cW, cH);
  mCtx.globalAlpha = 1.0;
  mCtx.restore(); 

  if (currentStage > 3 || isTransitioning) return;

  let userTips = {}; 
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const lms = results.multiHandLandmarks[0];
    
    mCtx.fillStyle = "rgba(0, 255, 255, 0.5)";
    FINGERS.forEach(f => {
      const pt = lms[f.id];
      const camX = ((pt.x * vW) - sx) * (cW / sW);
      const screenX = cW - camX;
      const screenY = ((pt.y * vH) - sy) * (cH / sH);
      userTips[f.id] = { x: screenX, y: screenY };

      mCtx.beginPath();
      mCtx.arc(screenX, screenY, 6, 0, Math.PI * 2);
      mCtx.fill();
    });
  }

  let allMatched = true;

  targets.forEach(t => {
    t.matched = false;
    
    if (Object.keys(userTips).length > 0) {
      if (t.reqFinger === null) {
        for (let id in userTips) {
          const dist = Math.hypot(userTips[id].x - t.x, userTips[id].y - t.y);
          if (dist < TARGET_RADIUS) { t.matched = true; break; }
        }
      } else {
        const tip = userTips[t.reqFinger.id];
        if (tip) {
          const dist = Math.hypot(tip.x - t.x, tip.y - t.y);
          if (dist < TARGET_RADIUS) t.matched = true;
        }
      }
    }
    if (!t.matched) allMatched = false;
    
    drawScannerFrame(t.x, t.y, t.matched, t.reqFinger ? t.reqFinger.name : "ANY");
  });

  if (allMatched) {
    if (matchStartTime === 0) {
      matchStartTime = Date.now();
      statusTxt.innerText = currentStage === 3 ? "MOVING... KEEP TRACKING!" : "HOLD STILL...";
      statusTxt.style.color = "#0f0";
    } else {
      const elapsed = Date.now() - matchStartTime;
      
      if (currentStage === 3) {
        const progress = Math.min(elapsed / MOVE_DURATION, 1);
        
        targets.forEach(t => {
          t.x = t.startX + (t.endX - t.startX) * progress;
          t.y = t.startY + (t.endY - t.startY) * progress;
        });

        // ★ 수정 2: 초록색 붓이 다음 프레임으로 오염되지 않게 save/restore로 묶어줌
        mCtx.save();
        mCtx.lineWidth = 10; mCtx.strokeStyle = "#00ff00";
        mCtx.strokeRect(0, 0, cW, cH * progress);
        mCtx.restore();

        if (progress >= 1) stageCleared();

      } else {
        const progress = Math.min(elapsed / HOLD_DURATION, 1);
        
        // ★ 수정 2: 동일
        mCtx.save();
        mCtx.lineWidth = 10; mCtx.strokeStyle = "#00ff00";
        mCtx.strokeRect(0, 0, cW, cH * progress);
        mCtx.restore();
        
        if (progress >= 1) stageCleared();
      }
    }
  } else {
    matchStartTime = 0;
    if (currentStage === 3) {
      targets.forEach(t => { t.x = t.startX; t.y = t.startY; }); 
    }
    statusTxt.innerText = currentStage === 2 ? "PLACE CORRECT FINGERS" : "AWAITING FINGERPRINT...";
    statusTxt.style.color = "rgba(0, 255, 255, 0.8)";
  }
});

function stageCleared() {
  isTransitioning = true;
  matchStartTime = 0;
  statusTxt.innerText = "ACCESS GRANTED!";
  statusTxt.style.color = "#0f0";

  setTimeout(() => {
    currentStage++;
    isTransitioning = false;
    if (currentStage > 3) {
      headerTxt.innerText = "SYSTEM UNLOCKED";
      statusTxt.innerText = "SECURITY OVERRIDDEN.";
      targets = []; 
    } else {
      setupStage();
    }
  }, 1500);
}

const camera = new Camera(video, { onFrame: async () => { await hands.send({ image: video }); }, width: 640, height: 480 });
camera.start().then(() => {
  setTimeout(init, 500); 
});

window.addEventListener('resize', init);
  </script>
</body>
</html>
